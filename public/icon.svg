<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="topFace" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="#1a1625"/>
  <!-- Subtle purple inner glow on background -->
  <rect width="180" height="180" rx="36" fill="#7c3aed" opacity="0.06"/>

  <!-- ── Isometric cube ── -->
  <!-- Top face -->
  <polygon
    points="90,14 164,56 90,98 16,56"
    fill="url(#topFace)"
  />
  <!-- Left face (dark) -->
  <polygon
    points="16,56 16,136 90,178 90,98"
    fill="#2e1065"
  />
  <!-- Right face (medium) -->
  <polygon
    points="164,56 164,136 90,178 90,98"
    fill="url(#rightFace)"
  />

  <!-- ── Edge highlights ── -->
  <!-- Top face outline -->
  <polygon
    points="90,14 164,56 90,98 16,56"
    fill="none"
    stroke="#c4b5fd"
    stroke-width="1.5"
    stroke-linejoin="round"
    opacity="0.45"
  />
  <!-- Vertical edges -->
  <line x1="90" y1="98"  x2="90"  y2="178" stroke="#a78bfa" stroke-width="1.5" opacity="0.35"/>
  <line x1="16" y1="136" x2="90"  y2="178" stroke="#7c3aed" stroke-width="1.5" opacity="0.35"/>
  <line x1="164" y1="136" x2="90" y2="178" stroke="#7c3aed" stroke-width="1.5" opacity="0.35"/>
  <!-- Left/right vertical face edges -->
  <line x1="16"  y1="56" x2="16"  y2="136" stroke="#a78bfa" stroke-width="1.5" opacity="0.25"/>
  <line x1="164" y1="56" x2="164" y2="136" stroke="#a78bfa" stroke-width="1.5" opacity="0.25"/>

  <!-- ── Dice pip — glowing dot on top face ── -->
  <!-- Outer glow -->
  <circle cx="90" cy="56" r="14" fill="#a78bfa" filter="url(#glow)" opacity="0.6"/>
  <!-- Pip -->
  <circle cx="90" cy="56" r="9" fill="#ede9fe"/>
  <!-- Pip inner gem -->
  <circle cx="90" cy="56" r="5" fill="#7c3aed"/>

  <!-- ── "20" label on the right face ── -->
  <text
    x="127" y="125"
    font-family="ui-monospace, 'SF Mono', monospace"
    font-size="30"
    font-weight="800"
    fill="#c4b5fd"
    text-anchor="middle"
    opacity="0.85"
  >20</text>
</svg>
